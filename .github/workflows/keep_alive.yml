name: Supabase Keep Alive

on:
  schedule:
    - cron: '0 0 * * 0,3' # هر یکشنبه و چهارشنبه خودکار اجرا می‌شود
  workflow_dispatch: # این خط باعث می‌شود دکمه Run ظاهر شود

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Send Request
        run: |
          curl -X GET "https://vhufqhydoengrbuyedu.supabase.co/rest/v1/" \
          -H "apikey: ${{ secrets.SUPABASE_ANON_KEY }}" \
          -H "Authorization: Bearer ${{ secrets.SUPABASE_ANON_KEY }}"
